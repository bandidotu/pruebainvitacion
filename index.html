<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años - Invitación Real</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">
        <div class="overlay">
            <h1 class="fade-in">Mis 15 Años</h1>
            <h2 class="nombre-quinceañera">Valentina</h2>
            <p class="fecha-texto">23 de Mayo, 2026</p>
        </div>
    </header>

    <section class="cuenta-regresiva">
        <h3>Faltan:</h3>
        <div id="timer">
            <div class="tiempo-caja"><span id="dias">00</span><p>Días</p></div>
            <div class="tiempo-caja"><span id="horas">00</span><p>Hrs</p></div>
            <div class="tiempo-caja"><span id="minutos">00</span><p>Min</p></div>
            <div class="tiempo-caja"><span id="segundos">00</span><p>Seg</p></div>
        </div>
    </section>

    <section class="detalles">
        <div class="tarjeta">
            <h3>Ceremonia</h3>
            <p>Parroquia de Nuestra Señora</p>
            <p>18:00 hrs</p>
            <a href="#" class="btn">Ver Mapa</a>
        </div>
        <div class="tarjeta">
            <h3>Recepción</h3>
            <p>Salón de Eventos Real</p>
            <p>20:00 hrs</p>
            <a href="#" class="btn">Ver Mapa</a>
        </div>
    </section>

    <section class="rsvp">
        <h3>¿Nos acompañas?</h3>
        <p>Tu presencia es nuestro mejor regalo.</p>
        <button id="btnConfirmar" class="btn-premium">Confirmar Asistencia</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
